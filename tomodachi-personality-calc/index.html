<!DOCTYPE html>
<html lang="en" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomodachi Life: LTD Personality Calculator</title>
</head>
<body>
    <p>This is a quick tool to calculate what personality will be picked when making a Mii. Both NTSC and PAL terms are shown.</p>
    <table id="personalityInputTable">
        <tr>
            <td>Movement</td>
            <td>
                <input type="radio" name="movement" value="0" checked>
                <input type="radio" name="movement" value="1">
                <input type="radio" name="movement" value="2">
                <input type="radio" name="movement" value="3">
                <input type="radio" name="movement" value="4">
                <input type="radio" name="movement" value="5">
                <input type="radio" name="movement" value="6">
                <input type="radio" name="movement" value="7">
            </td>
        </tr>
        <tr>
            <td>Speech</td>
            <td>
                <input type="radio" name="speech" value="0" checked>
                <input type="radio" name="speech" value="1">
                <input type="radio" name="speech" value="2">
                <input type="radio" name="speech" value="3">
                <input type="radio" name="speech" value="4">
                <input type="radio" name="speech" value="5">
                <input type="radio" name="speech" value="6">
                <input type="radio" name="speech" value="7">
            </td>
        </tr>
        <tr>
            <td>Energy</td>
            <td>
                <input type="radio" name="energy" value="0" checked>
                <input type="radio" name="energy" value="1">
                <input type="radio" name="energy" value="2">
                <input type="radio" name="energy" value="3">
                <input type="radio" name="energy" value="4">
                <input type="radio" name="energy" value="5">
                <input type="radio" name="energy" value="6">
                <input type="radio" name="energy" value="7">
            </td>
        </tr>
        <tr>
            <td>Attitude/Thinking</td>
            <td>
                <input type="radio" name="attitude" value="0" checked>
                <input type="radio" name="attitude" value="1">
                <input type="radio" name="attitude" value="2">
                <input type="radio" name="attitude" value="3">
                <input type="radio" name="attitude" value="4">
                <input type="radio" name="attitude" value="5">
                <input type="radio" name="attitude" value="6">
                <input type="radio" name="attitude" value="7">
            </td>
        </tr>
        <tr>
            <td>Overall*</td>
            <td>
                <input type="radio" name="overall" checked>
                <input type="radio" name="overall">
                <input type="radio" name="overall">
                <input type="radio" name="overall">
                <input type="radio" name="overall">
                <input type="radio" name="overall">
                <input type="radio" name="overall">
                <input type="radio" name="overall">
            </td>
        </tr>
    </table>
    <i>*Has no effect on the personality, only affects general behavior of the mii.</i>
    <p id="personalityOutput">n/a</p>
</body>
<script src="scripts.js"></script>
</html>
